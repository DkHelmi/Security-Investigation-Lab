  <text x="222" y="468" font-family="monospace" font-size="14" fill="#2A5A8A" text-anchor="middle">Windows Server 2022</text>
  <text x="222" y="490" font-family="monospace" font-size="14" fill="#2A5A8A" text-anchor="middle">Sysmon · Wazuh agent</text>
  <text x="222" y="514" font-family="monospace" font-size="13" fill="#1A4A7A" text-anchor="middle">192.168.30.100</text>

